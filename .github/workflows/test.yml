# GitHub Actions — Pester tests + JSON validation
# Runs on push to main and pull requests

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Pester Tests (PowerShell ${{ matrix.ps-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        ps-version: ['7.4', '7.6']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell ${{ matrix.ps-version }}
        uses: actions/setup-powershell@v1
        with:
          pwsh-version: ${{ matrix.ps-version }}

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: |
          Invoke-Pester tests/Toolkit.Tests.ps1 -Output Detailed -CI

      - name: Validate JSON (settings.json)
        shell: pwsh
        run: |
          $files = @('configs/settings.json', 'configs/wt-schemes.json')
          foreach ($f in $files) {
            try {
              Get-Content $f -Raw | ConvertFrom-Json | Out-Null
              Write-Host "✅ $f — valid JSON"
            } catch {
              Write-Error "❌ $f — INVALID JSON: $_"
              exit 1
            }
          }

      - name: Validate JSON (profiles-fragment.json)
        shell: pwsh
        run: |
          try {
            Get-Content scripts/profiles-fragment.json -Raw | ConvertFrom-Json | Out-Null
            Write-Host "✅ profiles-fragment.json — valid JSON"
          } catch {
            Write-Error "❌ profiles-fragment.json — INVALID JSON: $_"
            exit 1
          }
